# Application Configuration
spring.application.name=asset-management-system

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ams_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# HikariCP Connection Pool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# MyBatis-Plus Configuration
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.ams.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.cache-enabled=false
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# JWT Configuration
jwt.secret=${JWT_SECRET:AMS_SECRET_KEY_FOR_JWT_TOKEN_GENERATION_2024_VERY_LONG_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.header=Authorization
jwt.token-prefix=Bearer 

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.root=INFO
logging.level.com.ams=DEBUG
logging.level.com.ams.mapper=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n
logging.file.name=logs/ams.log

# Jackson
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.default-property-inclusion=non_null

# Permission cache
spring.cache.type=simple
spring.cache.cache-names=loginUser

# =============================================================================
# RuoYi RBAC: 数据权限配置（第一期不启用）
# =============================================================================
ams.data-scope.enabled=false

# =============================================================================
# MaxKey SSO / OAuth2 Mock 测试配置
# =============================================================================
spring.security.oauth2.client.registration.maxkey.client-id=forthams
spring.security.oauth2.client.registration.maxkey.client-secret=test-secret
spring.security.oauth2.client.registration.maxkey.client-name=MaxKey SSO Mock
spring.security.oauth2.client.registration.maxkey.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.maxkey.redirect-uri={baseUrl}/login/oauth2/code/maxkey
spring.security.oauth2.client.registration.maxkey.scope=openid,profile,email

spring.security.oauth2.client.provider.maxkey.authorization-uri=http://localhost:8080/api/oauth2-mock/authorize
spring.security.oauth2.client.provider.maxkey.token-uri=http://localhost:8080/api/oauth2-mock/token
spring.security.oauth2.client.provider.maxkey.user-info-uri=http://localhost:8080/api/oauth2-mock/userinfo
spring.security.oauth2.client.provider.maxkey.user-name-attribute=username

sso.mock.enabled=true
sso.mock.default-username=admin
sso.redirect.frontend=http://localhost:5173/sso-callback

# =============================================================================
# Security: Error handling
# =============================================================================
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never
