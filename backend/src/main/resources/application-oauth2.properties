# =============================================================================
# MaxKey SSO / OAuth2 对接配置模板
#
# 使用方式：
#   1. pom.xml 添加依赖 spring-boot-starter-oauth2-client
#   2. 启动时加 --spring.profiles.active=oauth2
#   3. 将下方占位符替换为真实 MaxKey 实例配置
# =============================================================================

# -- MaxKey 服务端点 -----------------------------------------------------------
# maxkey.issuer-uri=https://sso.example.com
# maxkey.authorization-uri=${maxkey.issuer-uri}/authz/oauth/v20/authorize
# maxkey.token-uri=${maxkey.issuer-uri}/authz/oauth/v20/token
# maxkey.user-info-uri=${maxkey.issuer-uri}/api/oauth/v20/me
# maxkey.jwk-set-uri=${maxkey.issuer-uri}/authz/oauth/v20/jwks

# -- OAuth2 Client 注册 --------------------------------------------------------
# spring.security.oauth2.client.registration.maxkey.client-id=forthams
# spring.security.oauth2.client.registration.maxkey.client-secret=your-secret
# spring.security.oauth2.client.registration.maxkey.client-name=MaxKey SSO
# spring.security.oauth2.client.registration.maxkey.authorization-grant-type=authorization_code
# spring.security.oauth2.client.registration.maxkey.redirect-uri={baseUrl}/login/oauth2/code/maxkey
# spring.security.oauth2.client.registration.maxkey.scope=openid,profile,email
# spring.security.oauth2.client.registration.maxkey.client-authentication-method=client_secret_basic

# -- OAuth2 Provider 配置 -------------------------------------------------------
# spring.security.oauth2.client.provider.maxkey.issuer-uri=${maxkey.issuer-uri}
# spring.security.oauth2.client.provider.maxkey.authorization-uri=${maxkey.authorization-uri}
# spring.security.oauth2.client.provider.maxkey.token-uri=${maxkey.token-uri}
# spring.security.oauth2.client.provider.maxkey.user-info-uri=${maxkey.user-info-uri}
# spring.security.oauth2.client.provider.maxkey.jwk-set-uri=${maxkey.jwk-set-uri}
# spring.security.oauth2.client.provider.maxkey.user-name-attribute=username

# -- 账号同步策略 ---------------------------------------------------------------
# ams.sso.auto-create-user=true         # SSO 登录时自动创建本地用户
# ams.sso.default-role-id=2             # 新用户默认角色 (2=USER)
# ams.sso.default-dept-id=1             # 新用户默认部门
# ams.sso.sync-attributes=username,realName,email,phone
# ams.sso.role-mapping.admin-role=SUPER_ADMIN
