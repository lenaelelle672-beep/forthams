# Test Environment Configuration

# H2 Database
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=never

# H2 Console (disabled in tests)
spring.h2.console.enabled=false

# MyBatis-Plus Configuration
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.nologging.NoLoggingImpl
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# JWT Configuration (test values)
jwt.secret=TEST_SECRET_KEY_FOR_JUNIT_TESTING_ONLY_DO_NOT_USE_IN_PRODUCTION
jwt.expiration=3600000

# Method-level RuoYi permission checks are verified separately; legacy
# controller slice tests keep filters disabled and should exercise routing
# and service delegation without needing seeded menu permissions.
ams.security.method-permission-test-bypass=true

# Logging
logging.level.com.ams=DEBUG
logging.level.org.springframework.test=INFO
